<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Careerly</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ✅ FIXED script links -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<style>
body { margin:0; background:#0a0a0f; color:white; font-family:Arial;}
#root { height:100vh;}
.sidebar { width:220px; background:#111; padding:20px;}
.main { flex:1; padding:20px;}
.container { display:flex; height:100%;}

button {
  padding:10px;
  margin:5px;
  background:#6c63ff;
  color:white;
  border:none;
  cursor:pointer;
}

input {
  display:block;
  margin:10px 0;
  padding:8px;
}
</style>
</head>

<body>
<div id="root"></div>

<script>
const e = React.createElement;

function App() {
  const [page, setPage] = React.useState("dashboard");

  function renderPage(){
    if(page === "dashboard"){
      return e("div", null,
        e("h1", null, "🚀 Careerly Advanced App"),
        e("p", null, "Now React is working without black screen ✅")
      );
    }

    if(page === "cv"){
      return e("div", null,
        e("h2", null, "CV Builder"),
        e("input", {placeholder:"Your Name"}),
        e("input", {placeholder:"Job Title"}),
        e("button", null, "Generate CV")
      );
    }

    if(page === "cover"){
      return e("h2", null, "✉️ Cover Letter Section");
    }

   if(page === "tracker"){
  return e("div", null,
    e("h2", null, "📊 Application Tracker"),

    e("input", {placeholder:"Company"}),
    e("input", {placeholder:"Role"}),
    
    e("button", {onClick:()=>alert("Added!")}, "Add Application")
  );
    }
  }

  return e("div",{className:"container"},
    e("div",{className:"sidebar"},
      e("h2", null, "Careerly"),
      e("button",{onClick:()=>setPage("dashboard")},"Dashboard"),
      e("button",{onClick:()=>setPage("cv")},"CV Builder"),
      e("button",{onClick:()=>setPage("cover")},"Cover Letter"),
      e("button",{onClick:()=>setPage("tracker")},"Tracker")
    ),
    e("div",{className:"main"},
      renderPage()
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>

</body>
</html>
