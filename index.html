<!DOCTYPE html>
<html>
<head>
  <title>Careerly</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin:0;
      font-family: Arial;
      background:black;
      color:white;
    }

    .container {
      display:flex;
      height:100vh;
    }

    .sidebar {
      width:220px;
      background:#111;
      padding:20px;
    }

    .sidebar h2 { margin-bottom:20px; }

    .sidebar button {
      display:block;
      width:100%;
      margin-bottom:10px;
      padding:10px;
      background:#222;
      color:white;
      border:none;
      cursor:pointer;
    }

    .sidebar button:hover { background:#6c63ff; }

    .main {
      flex:1;
      padding:30px;
    }

    input, textarea {
      width:100%;
      padding:10px;
      margin:10px 0;
      background:#222;
      color:white;
      border:none;
    }

    button.primary {
      background:#6c63ff;
      padding:10px 20px;
      border:none;
      color:white;
      cursor:pointer;
    }

    .card {
      background:#111;
      padding:20px;
      margin-bottom:20px;
    }

  </style>
</head>

<body>

<div id="app"></div>

<script>
let page = "dashboard";

function showPage(p){
  page = p;
  render();
}

function render(){
  const app = document.getElementById("app");

  app.innerHTML = `
    <div class="container">
      <div class="sidebar">
        <h2>🚀 Careerly</h2>

        <button onclick="showPage('dashboard')">Dashboard</button>
        <button onclick="showPage('cv')">CV Builder</button>
        <button onclick="showPage('cover')">Cover Letter</button>
        <button onclick="showPage('tracker')">Tracker</button>
      </div>

      <div class="main">
        ${pageContent()}
      </div>
    </div>
  `;
}

function pageContent(){
  if(page==="dashboard"){
    return `
      <h1>Welcome to Careerly ✅</h1>
      <p>Your app is working!</p>
    `;
  }

  if(page==="cv"){
    return `
      <h2>AI CV Builder</h2>

      <input id="name" placeholder="Your Name">
      <input id="job" placeholder="Job Title">
      <textarea id="desc" placeholder="Job Description"></textarea>

      <button class="primary" onclick="generateCV()">Generate CV</button>

      <div id="cvResult" class="card"></div>
    `;
  }

  if(page==="cover"){
    return `
      <h2>Cover Letter</h2>

      <input id="cname" placeholder="Your Name">
      <input id="company" placeholder="Company Name">

      <button class="primary" onclick="generateCover()">Generate Letter</button>

      <div id="coverResult" class="card"></div>
    `;
  }

  if(page==="tracker"){
    return `
      <h2>Application Tracker</h2>

      <input id="comp" placeholder="Company">
      <input id="role" placeholder="Role">

      <button class="primary" onclick="addApp()">Add</button>

      <ul id="list"></ul>
    `;
  }
}

function generateCV(){
  const name = document.getElementById("name").value;
  const job = document.getElementById("job").value;

  document.getElementById("cvResult").innerText =
  "CV for " + name + " applying for " + job + "\\n\\n(Sample AI Output)";
}

function generateCover(){
  const name = document.getElementById("cname").value;
  const company = document.getElementById("company").value;

  document.getElementById("coverResult").innerText =
  "Cover Letter\\n\\nDear " + company + ",\\n\\nMy name is " + name;
}

let apps = [];

function addApp(){
  const comp = document.getElementById("comp").value;
  const role = document.getElementById("role").value;

  apps.push(comp + " - " + role);

  document.getElementById("list").innerHTML =
    apps.map(a => "<li>"+a+"</li>").join("");
}

render();
</script>

</body>
</html>
